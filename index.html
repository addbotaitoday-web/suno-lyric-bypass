<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>My Google AI Studio App</title>
    <script>
      // Fix "Uncaught TypeError: Cannot set property fetch of #<Window> which has only a getter"
      (function() {
        try {
          var originalFetch = window.fetch || globalThis.fetch;
          var currentFetch = originalFetch;
          try {
            Object.defineProperty(window, 'fetch', {
              get: function() { return currentFetch; },
              set: function(val) { currentFetch = val; },
              configurable: true,
              enumerable: true
            });
          } catch (e1) {
            // Fallback for environments where defineProperty fails on window
            window.fetch = originalFetch;
          }
        } catch (e) {
          console.warn("Failsafe fetch patch issue:", e);
        }
      })();
    </script>
  </head>
  <body>
    <div id="root"></div>
    <script type="module" src="/src/main.tsx"></script>
  </body>
</html>
